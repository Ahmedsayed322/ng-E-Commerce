<div class="flex flex-col gap-6 max-w-100 p-8">
  <div class="flex justify-between">
    <div class="flex flex-col gap-1">
      <p class="text-xl font-semibold">Sign In</p>
      <p class="text-sm text-gray-600">Sign in to your account to continue shopping</p>
    </div>
    <div>
      <button tabIndex="-1" matIconButton mat-dialog-close class="-mr-2 -mt-2">
        <mat-icon>close</mat-icon>
      </button>
    </div>
  </div>

  <form [formGroup]="form" class="flex flex-col items-center gap-4" (ngSubmit)="logIn()">
    <mat-form-field>
      <mat-label>Enter your email</mat-label>
      <input matInput type="text" formControlName="email" />
      <mat-icon matPrefix class="-ml-2">email</mat-icon>
    </mat-form-field>
    <mat-form-field>
      <mat-label>Enter your password</mat-label>
      <input
        matInput
        [type]="hide() ? 'password' : 'text'"
        formControlName="password"
        placeholder="********"
      />
      <mat-icon matPrefix class="-ml-2">lock</mat-icon>
      <button
        class="mr-2 cursor-pointer"
        matSuffix
        (click)="togglePassword()"
        [attr.aria-label]="'Hide password'"
        [attr.aria-pressed]="hide()"
      >
        <mat-icon>{{ hide() ? 'visibility_off' : 'visibility' }}</mat-icon>
      </button>
    </mat-form-field>
    <button type="submit" matButton="filled" class="w-full">Sign In</button>
    <p class="text-sm text-gray-600">
      Don't have an account?<a class="text-blue-600 cursor-pointer ml-1" (click)="signup()"
        >Sign Up</a
      >
    </p>
  </form>
</div>

<mat-toolbar class="w-screen! bg-white border-b border-gray-200 shadow-sm sticky top-0 z-50">
  <div class="max-w-300 mx-auto w-full md:px-4 flex items-center justify-between h-16">
    <!-- Logo & Menu -->
    <div class="flex items-center gap-1 mr-2">
      <button
        mat-icon-button
        class="text-gray-500 hover:bg-gray-100 rounded-full"
        (click)="productStore.toggleSideNav()"
      >
        <mat-icon>menu</mat-icon>
      </button>
      <span class="text-lg font-semibold text-gray-800 tracking-tight hidden md:block">My App</span>
    </div>

    <div
      class="flex items-center w-full lg:w-lg h-10 px-1 bg-gray-200 border border-transparent rounded-full transition-all duration-200 focus-within:bg-white focus-within:border-blue-500 focus-within:ring-2 focus-within:ring-blue-100"
    >
      <mat-icon class="text-gray-400 shrink-0">search</mat-icon>
      <input
        type="text"
        class="bg-transparent border-none outline-none text-sm flex-1 md:w-full text-gray-800 placeholder-gray-400"
        #searchValue
        (keypress)="do($event)"
        placeholder="Search anything..."
      />
      @if (searchValue.value.length > 1) {
        <button
          mat-icon-button
          class="text-gray-400 hover:text-gray-700 shrink-0"
          (click)="clearSearch()"
        >
          <mat-icon>close</mat-icon>
        </button>
      }
    </div>

    <!-- Icons -->
    <div class="flex items-center shrink-0">
      <app-header-icons />
    </div>
  </div>
</mat-toolbar>

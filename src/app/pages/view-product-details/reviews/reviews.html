<div appPanel class="max-w-300 w-full mx-auto">
  <div class="flex flex-col gap-4">
    <div class="flex justify-between">
      <h2 class="text-xl font-semibold">Customer Reviews</h2>
      @if (userStore.user()) {
        <button matButton="filled" (click)="reviewStore.toggleWriteReview()">Write a Review</button>
      }
    </div>
    @if (reviewStore.writeReview()) {
      <app-write-review />
    }
    <app-rating-summary
      [ratingObj]="product().rating"
      [reviews]="reviewStore.selectedProductReviews()"
    />
  </div>
</div>
<div class="max-w-300 w-full mx-auto">
  <h2 class="text-xl font-semibold mt-3 mb-3">Comments</h2>
  <div class="flex flex-col gap-4">
    @for (comment of sortedReviews(); track comment.id) {
      <app-comments [comment]="comment" />
    }
  </div>
</div>

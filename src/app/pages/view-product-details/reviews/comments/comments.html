<div appPanel class="flex gap-4">
  <img [src]="comment().userImageUrl" class="w-10 rounded-full self-start" alt="" />
  <div class="flex flex-col gap-2">
    <h3 class="text-lg font-semibold">{{ comment().userName }}</h3>
    <div class="flex gap-2">
      <app-rating [rating]="comment().rating" />
      <p class=" text-gray-600">{{ comment().reviewDate | date }}</p>
    </div>
    <p class="text-lg font-semibold">{{ comment().title }}</p>
    <p class="text-sm text-gray-500 -mt-1 ">{{ comment().comment }}</p>
  </div>
</div>

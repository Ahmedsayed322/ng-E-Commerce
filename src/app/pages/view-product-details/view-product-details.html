@if (productStore.selectedProductLoading()) {
  <app-spinner />
} @else {
  <div class="mx-auto max-w-300 w-full overflow-auto">
    <app-back-button [navigateTo]="`/products/${productStore.category()}`" class="mb-8">
      <p>Back to Store</p>
    </app-back-button>
    <div class="flex flex-col items-center md:flex-row gap-8 mb-8 p-4">
      <img
        [src]="productStore.selectedProduct()?.image"
        class="w-100 h-100 object-contain rounded-lg"
        [style.view-transition-name]="'product-img-' + productStore.selectedProduct()?.id"
      />
      <app-product-info [product]="productStore.selectedProduct()" />
    </div>
  </div>
  <app-reviews [product]="productStore.selectedProduct()!"> </app-reviews>
}

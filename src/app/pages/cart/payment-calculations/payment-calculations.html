<div appPanel class="flex flex-col gap-4  mb-2">
  <h2 class="text-2xl font-semibold">Order Summary</h2>
  <ng-content select="[items]" />
  <div class="border-y flex flex-col gap-4 py-4">
    <div class="flex justify-between text-xl">
      <p class="">Subtotal</p>
      <p>{{ store.totalCartAmount().total | currency }}</p>
    </div>
    <div class="flex justify-between text-xl">
      <p class="">Tax</p>
      <p>{{ store.totalCartAmount().tax | currency }}</p>
    </div>
  </div>
  <div class="text-lg font-bold flex justify-between">
    <h2>Total</h2>
    <h2>{{ store.totalCartAmount().totalAfterTax | currency }}</h2>
  </div>
  <ng-content select="[action]" />
</div>

<div class="mx-auto max-w-300 pt-6 flex flex-col gap-6">
  <app-back-button navigateTo="/cart">
    <p>Back to Cart</p>
  </app-back-button>
  <p class="text-3xl font-bold">Checkout</p>
  <div class="grid grid-cols-6 gap-4">
    <div class="flex flex-col gap-6 col-span-6 lg:col-span-4 max-h-fit rounded-md">
      <app-shipping-form
        appPanel
        class="min-w-fit"
        (shippingForm)="getShippingData($event)"
      ></app-shipping-form>
      <app-payment-opt appPanel> </app-payment-opt>
    </div>

    <app-payment-calculations class="col-span-6 lg:col-span-2">
      <ng-container items>
        <div class="flex flex-col justify-center gap-1">
          @for (item of cartStore.cartItems(); track item.product.id) {
            <div class="flex justify-between">
              <p>{{ item.product.title }} x {{ item.quantity }}</p>
              <p>{{ item.product.price * item.quantity | currency }}</p>
            </div>
          }
        </div>
      </ng-container>
      <ng-container action>
        <button
          matButton="filled"
          (click)="cartStore.placeOrder()"
          [disabled]="cartStore.placeOrderLoading()"
        >
          @if (cartStore.placeOrderLoading()) {
            processing
          } @else {
            place Order
          }
        </button>
      </ng-container>
    </app-payment-calculations>
  </div>
</div>
